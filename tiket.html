<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiket Pendaftaran — PKSP 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{ --teal-900:#0B3B3C; --teal-500:#178582; --mist:#F2F6F5; --ink:#13292A; --line:#D7E2E0; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif; background:var(--teal-900); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .tiket{background:#fff; border-radius:20px; width:100%; max-width:380px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.35);}
  .kepala{background:var(--teal-900); color:#fff; text-align:center; padding:26px 20px 20px;}
  .kepala h1{font-family:'Space Grotesk'; font-size:1.5rem; letter-spacing:.03em;}
  .kepala p{font-size:.72rem; opacity:.75; margin-top:4px; letter-spacing:.08em; text-transform:uppercase;}
  .badanTiket{padding:26px 24px; text-align:center;}
  .lubang{position:relative; border-top:2px dashed var(--line); margin:0 18px;}
  .lubang::before,.lubang::after{content:""; position:absolute; top:-11px; width:22px; height:22px; border-radius:50%; background:var(--teal-900);}
  .lubang::before{left:-29px;} .lubang::after{right:-29px;}
  #qr{display:flex; justify-content:center; margin:6px 0 14px;}
  #qr img,#qr canvas{border:1px solid var(--line); border-radius:12px; padding:12px; background:#fff;}
  .kod{font-family:'Space Grotesk'; font-weight:700; font-size:1.15rem; letter-spacing:.12em; color:var(--ink);}
  .nota{background:var(--mist); border-radius:12px; padding:14px; font-size:.8rem; text-align:left; color:#3c5253; margin-top:18px; line-height:1.55;}
  .nota b{display:block; margin-bottom:4px; color:var(--ink);}
  .simpan{margin-top:16px; font-size:.78rem; color:#5a6f70;}
  .err{padding:40px 24px; text-align:center; color:#3c5253; font-size:.9rem; line-height:1.6;}
</style>
</head>
<body>
  <div class="tiket">
    <div class="kepala">
      <h1>PKSP 2026</h1>
      <p>Tiket Pendaftaran Rasmi</p>
    </div>
    <div class="badanTiket" id="badan">
      <div id="qr"></div>
      <div class="kod" id="paparKod">—</div>
      <div class="nota">
        <b>Arahan pada hari persidangan</b>
        1. Simpan skrin ini sebagai gambar (screenshot).<br>
        2. Tuju ke <b>Lorong A — QR Express</b>.<br>
        3. Tunjukkan QR ini kepada petugas untuk imbasan.<br>
        4. Ambil tag nama & kit peserta anda.
      </div>
      <p class="simpan">Kaunter pendaftaran dibuka jam 7:30 pagi.</p>
    </div>
  </div>
<script>
  const kod = new URLSearchParams(location.search).get("kod");
  if(kod){
    document.getElementById("paparKod").textContent = kod.toUpperCase();
    new QRCode(document.getElementById("qr"), { text: kod.toUpperCase(), width: 220, height: 220, correctLevel: QRCode.CorrectLevel.M });
  }else{
    document.getElementById("badan").innerHTML =
      '<div class="err">Pautan tidak lengkap.<br>Sila gunakan pautan penuh yang dihantar melalui e-mel atau WhatsApp, contohnya:<br><br><code>tiket.html?kod=PKSP26-A1B2C3</code></div>';
  }
</script>
</body>
</html>
